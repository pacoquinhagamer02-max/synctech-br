var emojis = produtos.map(function(p){ return p.emoji; });

function copiar(texto, btn) {
  navigator.clipboard.writeText(texto).then(function(){
    btn.textContent = '✓ COPIADO';
    btn.classList.add('ok');
    setTimeout(function(){ btn.textContent = 'COPIAR'; btn.classList.remove('ok'); }, 2000);
  });
}

function renderCards() {
  var grid = document.getElementById('grid');
  produtos.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-n', p.n);

    // Foto
    var img = document.createElement('img');
    img.className = 'prod-foto';
    img.src = 'fotos_produtos/produto_' + String(p.n).padStart(2,'0') + '.jpg';
    img.alt = p.nome;
    img.loading = 'lazy';
    img.onerror = function(){
      var ph = document.createElement('div');
      ph.className = 'prod-foto-err';
      ph.textContent = p.emoji;
      this.parentNode.replaceChild(ph, this);
    };
    card.appendChild(img);

    // Cabeçalho
    var head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML = '<div class="prod-num">PRODUTO #' + String(p.n).padStart(2,'0') + ' · DROPI NACIONAL</div>' +
      '<div class="prod-name">' + p.nome + '</div>' +
      '<div class="prod-meta">' +
        '<span class="tag tag-price">💰 Venda: ' + p.preco + '</span>' +
        '<span class="tag tag-buy">📦 Custo: ' + p.compra + '</span>' +
        '<span class="tag tag-margin">📈 ' + p.margem + '</span>' +
        '<span class="tag tag-cat">' + p.cat.split('>')[0].trim() + '</span>' +
        '<span class="tag tag-stock">✅ ' + p.estoque + '</span>' +
      '</div>';
    card.appendChild(head);

    // Corpo
    var body = document.createElement('div');
    body.className = 'card-body';

    // Info boxes
    body.innerHTML += '<div class="info-row">' +
      '<div class="info-box"><div class="ib-label">Categoria</div><div class="ib-value" style="font-size:10px;color:#00d4ff">' + p.cat + '</div></div>' +
    '</div>';

    // Título
    var f1 = document.createElement('div'); f1.className = 'field';
    var l1 = document.createElement('div'); l1.className = 'field-label';
    l1.innerHTML = '<span>TÍTULO</span>';
    var b1 = document.createElement('button'); b1.className = 'copy-btn'; b1.textContent = 'COPIAR';
    b1.onclick = function(){ copiar(p.titulo, b1); };
    l1.appendChild(b1); f1.appendChild(l1);
    var c1 = document.createElement('div'); c1.className = 'field-content'; c1.textContent = p.titulo;
    f1.appendChild(c1); body.appendChild(f1);

    // Descrição
    var f2 = document.createElement('div'); f2.className = 'field';
    var l2 = document.createElement('div'); l2.className = 'field-label';
    l2.innerHTML = '<span>DESCRIÇÃO</span>';
    var b2 = document.createElement('button'); b2.className = 'copy-btn'; b2.textContent = 'COPIAR';
    b2.onclick = function(){ copiar(p.descricao, b2); };
    l2.appendChild(b2); f2.appendChild(l2);
    var c2 = document.createElement('div'); c2.className = 'field-content'; c2.textContent = p.descricao;
    f2.appendChild(c2); body.appendChild(f2);

    // Tags
    var f3 = document.createElement('div'); f3.className = 'field';
    var l3 = document.createElement('div'); l3.className = 'field-label';
    l3.innerHTML = '<span>TAGS</span>';
    var b3 = document.createElement('button'); b3.className = 'copy-btn'; b3.textContent = 'COPIAR';
    b3.onclick = function(){ copiar(p.tags, b3); };
    l3.appendChild(b3); f3.appendChild(l3);
    var c3 = document.createElement('div'); c3.className = 'field-content'; c3.textContent = p.tags;
    f3.appendChild(c3); body.appendChild(f3);

    card.appendChild(body);
    grid.appendChild(card);
  });
}

renderCards();
</script>
